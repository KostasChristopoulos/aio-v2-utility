name: Build and Release AIO Tool

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with v (e.g. v2.8.0)

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pandas Pillow tkinterdnd2 openpyxl pyinstaller
        
    - name: Build macOS Apps
      run: |
        # Build AIO CSV Tool
        pyinstaller --noconfirm --windowed --name "AIO_CSV_Tool" --icon "assets/icon.icns" --add-data "assets:assets" --add-data "$(python -c 'import customtkinter; print(customtkinter.__path__[0])'):customtkinter" --hidden-import "PIL.ImageTk" --hidden-import "PIL.Image" --collect-all "tkinterdnd2" main.py
        
        # Build Splitter Pro
        pyinstaller --noconfirm --windowed --name "Splitter Pro" --icon "assets/icon.icns" --add-data "assets:assets" --add-data "$(python -c 'import customtkinter; print(customtkinter.__path__[0])'):customtkinter" --hidden-import "PIL.ImageTk" --hidden-import "PIL.Image" --collect-all "tkinterdnd2" icsv_splitter.py
        
    - name: Zip Apps
      run: |
        cd dist
        TAG_NAME=${GITHUB_REF#refs/tags/}
        zip -qr AIO_CSV_Tool_${TAG_NAME}_macOS.zip "AIO_CSV_Tool.app"
        zip -qr Splitter_Pro_macOS.zip "Splitter Pro.app"
        
    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-apps
        path: dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pandas Pillow tkinterdnd2 openpyxl pyinstaller
        
    - name: Build Windows Apps
      run: |
        # Build AIO CSV Tool
        pyinstaller --noconfirm --windowed --name "AIO_CSV_Tool" --icon "assets/icon.ico" --add-data "assets;assets" --add-data "$(python -c 'import customtkinter; print(customtkinter.__path__[0])');customtkinter" --hidden-import "PIL.ImageTk" --hidden-import "PIL.Image" --collect-all "tkinterdnd2" main.py
        
        # Build Splitter Pro
        pyinstaller --noconfirm --windowed --name "Splitter Pro" --icon "assets/icon.ico" --add-data "assets;assets" --add-data "$(python -c 'import customtkinter; print(customtkinter.__path__[0])');customtkinter" --hidden-import "PIL.ImageTk" --hidden-import "PIL.Image" --collect-all "tkinterdnd2" icsv_splitter.py
        
    - name: Zip Windows Apps
      shell: pwsh
      run: |
        $TAG_NAME = $env:GITHUB_REF -replace 'refs/tags/', ''
        Compress-Archive -Path "dist/AIO_CSV_Tool.exe" -DestinationPath "dist/AIO_CSV_Tool_${TAG_NAME}_Windows.zip"
        Compress-Archive -Path "dist/Splitter Pro.exe" -DestinationPath "dist/Splitter_Pro_Windows.zip"

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-apps
        path: dist/*.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-assets
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: all-assets/*.zip
